<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adult Income Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .result-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .result-card h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            color: #666;
            font-weight: 500;
        }

        .result-value {
            color: #333;
            font-weight: 700;
        }

        .prediction-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
        }

        .prediction-low {
            background: #d4edda;
            color: #155724;
        }

        .prediction-high {
            background: #f8d7da;
            color: #721c24;
        }

        .probability {
            font-size: 20px;
            color: #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💼 Adult Income Prediction</h1>
        <p class="subtitle">Predicera inkomst baserat på personliga karakteristikor</p>

        <div class="error" id="error"></div>

        <form id="predictionForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Ålder</label>
                    <input type="number" id="age" name="age" value="35" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label for="education_num">Utbildningsnivå</label>
                    <select id="education_num" name="education_num" required>
                        <option value="">Hämtar nivåer...</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="fnlwgt">Slutlig vikt</label>
                    <input type="number" id="fnlwgt" name="fnlwgt" value="100000" min="0" required>
                </div>
                <div class="form-group">
                    <label for="hours_per_week">Timmar per vecka</label>
                    <input type="number" id="hours_per_week" name="hours_per_week" value="40" min="0" max="100" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="capital_gain">Kapitalvinst</label>
                    <input type="number" id="capital_gain" name="capital_gain" value="5000" min="0" required>
                </div>
                <div class="form-group">
                    <label for="capital_loss">Kapitalförlust</label>
                    <input type="number" id="capital_loss" name="capital_loss" value="0" min="0" required>
                </div>
            </div>

            <div class="form-group">
                <label for="workclass">Arbetsklass</label>
                <select id="workclass" name="workclass" required>
                    <option value="Private">Private</option>
                    <option value="Self-emp-not-inc">Self-emp-not-inc</option>
                    <option value="Self-emp-inc">Self-emp-inc</option>
                    <option value="Federal-gov">Federal-gov</option>
                    <option value="Local-gov">Local-gov</option>
                    <option value="State-gov">State-gov</option>
                    <option value="Without-pay">Without-pay</option>
                    <option value="Never-worked">Never-worked</option>
                </select>
            </div>

            <div class="form-group">
                <label for="marital_status">Civilstatus</label>
                <select id="marital_status" name="marital_status" required>
                    <option value="Married-civ-spouse">Married-civ-spouse</option>
                    <option value="Married-spouse-absent">Married-spouse-absent</option>
                    <option value="Married-AF-spouse">Married-AF-spouse</option>
                    <option value="Never-married">Never-married</option>
                    <option value="Separated">Separated</option>
                    <option value="Divorced">Divorced</option>
                    <option value="Widowed">Widowed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="occupation">Yrke</label>
                <select id="occupation" name="occupation" required>
                    <option value="Exec-managerial">Exec-managerial</option>
                    <option value="Prof-specialty">Prof-specialty</option>
                    <option value="Craft-repair">Craft-repair</option>
                    <option value="Sales">Sales</option>
                    <option value="Transport-moving">Transport-moving</option>
                    <option value="Handlers-cleaners">Handlers-cleaners</option>
                    <option value="Tech-support">Tech-support</option>
                    <option value="Machine-op-inspct">Machine-op-inspct</option>
                    <option value="Farming-fishing">Farming-fishing</option>
                    <option value="Protective-serv">Protective-serv</option>
                    <option value="Priv-house-serv">Priv-house-serv</option>
                    <option value="Armed-Forces">Armed-Forces</option>
                    <option value="Other-service">Other-service</option>
                    <option value="Adm-clerical">Adm-clerical</option>
                </select>
            </div>

            <div class="form-group">
                <label for="relationship">Relation</label>
                <select id="relationship" name="relationship" required>
                    <option value="Husband">Husband</option>
                    <option value="Not-in-family">Not-in-family</option>
                    <option value="Own-child">Own-child</option>
                    <option value="Unmarried">Unmarried</option>
                    <option value="Wife">Wife</option>
                    <option value="Other-relative">Other-relative</option>
                </select>
            </div>

            <div class="form-group">
                <label for="race">Ras</label>
                <select id="race" name="race" required>
                    <option value="White">White</option>
                    <option value="Black">Black</option>
                    <option value="Asian-Pac-Islander">Asian-Pac-Islander</option>
                    <option value="Amer-Indian-Eskimo">Amer-Indian-Eskimo</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sex">Kön</label>
                <select id="sex" name="sex" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="native_country">Hemland</label>
                <select id="native_country" name="native_country" required>
                    <option value="">Hämtar länder...</option>
                </select>
            </div>

            <div class="buttons">
                <button type="submit" class="btn-primary">Predicera (Båda modeller)</button>
                <button type="reset" class="btn-secondary">Återställ</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Predicerar...</p>
        </div>

        <div class="results" id="results">
            <div style="margin-bottom: 30px; position: relative; height: 250px;">
                <canvas id="predictionChart"></canvas>
            </div>
            <div class="result-card" id="xgbResult"></div>
            <div class="result-card" id="mlpResult"></div>
        </div>
    </div>

    <script>
        // Ladda giltiga länder vid sidladdning
        async function loadCountries() {
            try {
                const response = await fetch('/valid-countries');
                const data = await response.json();
                const select = document.getElementById('native_country');
                select.innerHTML = '';

                data.countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country;
                    option.textContent = country;
                    if (country === 'United-States') {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Fel vid laddning av länder:', err);
            }
        }

        // Ladda utbildningsnivåer vid sidladdning
        async function loadEducationLevels() {
            try {
                const response = await fetch('/education-levels');
                const data = await response.json();
                const select = document.getElementById('education_num');
                select.innerHTML = '';

                Object.entries(data.education_levels).forEach(([num, name]) => {
                    const option = document.createElement('option');
                    option.value = num;
                    option.textContent = `${num}. ${name}`;
                    if (num === '13') {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Fel vid laddning av utbildningsnivåer:', err);
            }
        }

        // Ladda data när sidan startar
        document.addEventListener('DOMContentLoaded', () => {
            loadCountries();
            loadEducationLevels();

            // Event listener för formulär
            document.getElementById('predictionForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(e.target);
                const data = {
                    age: parseInt(formData.get('age')),
                    workclass: formData.get('workclass'),
                    fnlwgt: parseInt(formData.get('fnlwgt')),
                    education_num: parseInt(formData.get('education_num')),
                    marital_status: formData.get('marital_status'),
                    occupation: formData.get('occupation'),
                    relationship: formData.get('relationship'),
                    race: formData.get('race'),
                    sex: formData.get('sex'),
                    capital_gain: parseInt(formData.get('capital_gain')),
                    capital_loss: parseInt(formData.get('capital_loss')),
                    hours_per_week: parseInt(formData.get('hours_per_week')),
                    native_country: formData.get('native_country')
                };

                document.getElementById('loading').style.display = 'block';
                document.getElementById('results').style.display = 'none';
                document.getElementById('error').style.display = 'none';

                try {
                    const [xgbRes, mlpRes] = await Promise.all([
                        fetch('/predict/xgboost', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(data)
                        }),
                        fetch('/predict/mlp', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(data)
                        })
                    ]);

                    const xgb = await xgbRes.json();
                    const mlp = await mlpRes.json();

                    displayResults(xgb, mlp);
                } catch (err) {
                    showError('Fel: ' + err.message);
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            });
        });

        function displayResults(xgb, mlp) {
            const xgbCard = document.getElementById('xgbResult');
            const mlpCard = document.getElementById('mlpResult');

            xgbCard.innerHTML = `
                <h3>🌳 XGBoost Model</h3>
                <div class="result-item">
                    <span class="result-label">Prediction:</span>
                    <span class="result-value">
                        <span class="prediction-badge ${xgb.prediction === 0 ? 'prediction-low' : 'prediction-high'}">
                            ${xgb.prediction === 0 ? '≤50K' : '>50K'}
                        </span>
                    </span>
                </div>
                <div class="result-item">
                    <span class="result-label">Sannolikhet (>50K):</span>
                    <span class="result-value probability">${(xgb.probability * 100).toFixed(1)}%</span>
                </div>
            `;

            mlpCard.innerHTML = `
                <h3>🧠 MLP (Neural Network) Model</h3>
                <div class="result-item">
                    <span class="result-label">Prediction:</span>
                    <span class="result-value">
                        <span class="prediction-badge ${mlp.prediction === 0 ? 'prediction-low' : 'prediction-high'}">
                            ${mlp.prediction === 0 ? '≤50K' : '>50K'}
                        </span>
                    </span>
                </div>
                <div class="result-item">
                    <span class="result-label">Sannolikhet (>50K):</span>
                    <span class="result-value probability">${(mlp.probability * 100).toFixed(1)}%</span>
                </div>
            `;

            // Skapa chart
            try {
                const canvas = document.getElementById('predictionChart');
                const ctx = canvas.getContext('2d');

                if (window.predictionChart instanceof Chart) {
                    window.predictionChart.destroy();
                }

                window.predictionChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['XGBoost', 'MLP'],
                        datasets: [{
                            label: 'Sannolikhet för >50K (%)',
                            data: [xgb.probability * 100, mlp.probability * 100],
                            backgroundColor: ['#667eea', '#764ba2'],
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        plugins: {
                            legend: { display: true }
                        },
                        scales: {
                            x: {
                                beginAtZero: true,
                                max: 100
                            }
                        }
                    }
                });
            } catch (err) {
                console.error('Chart error:', err);
            }

            document.getElementById('results').style.display = 'block';
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }
    </script>
</body>
</html>
